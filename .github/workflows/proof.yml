name: Tier 2 Proof

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: tier-2-proof
  cancel-in-progress: false

jobs:
  live-proof:
    name: Self-Hosted Live Proof
    runs-on:
      - self-hosted
      - linux
      - x64
      - aegis-kvm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert proof-runner prerequisites
        run: |
          test -c /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
          command -v systemd-run
          command -v debugfs
          test -x "$HOME/.local/bin/firecracker"
          test -x /usr/lib/postgresql/16/bin/initdb
          test -x /usr/lib/postgresql/16/bin/pg_ctl
          test -x /usr/lib/postgresql/16/bin/psql
          test -f "$HOME/aegis/assets/vmlinux"
          test -f "$HOME/aegis/assets/alpine-base.ext4"

      - name: Materialize proof assets
        run: |
          mkdir -p assets
          ln -sfn "$HOME/aegis/assets/vmlinux" assets/vmlinux
          ln -sfn "$HOME/aegis/assets/alpine-base.ext4" assets/alpine-base.ext4

      - name: Prepare repo-local config
        run: |
          mkdir -p .aegis/bin
          cat > .aegis/config.yaml <<EOF
          version: v1

          api:
            url: "http://localhost:8080"

          database:
            url: "postgres://postgres:postgres@localhost/aegis?sslmode=disable"

          runtime:
            assets_dir: "${GITHUB_WORKSPACE}/assets"
            policy_path: "${GITHUB_WORKSPACE}/configs/default-policy.yaml"
            rootfs_path: "${GITHUB_WORKSPACE}/assets/alpine-base.ext4"
            firecracker_bin: "${HOME}/.local/bin/firecracker"
            orchestrator_bin: "${GITHUB_WORKSPACE}/.aegis/bin/orchestrator"
            cli_bin: "${GITHUB_WORKSPACE}/.aegis/bin/aegis"
            cgroup_parent: "/sys/fs/cgroup/user.slice/user-1000.slice/user@1000.service/aegis"
            proof_root: "/tmp/aegis/proofs"
            log_path: "/tmp/aegis-local-orchestrator.log"
            ui_dir: "${GITHUB_WORKSPACE}/ui"
            warm_pool_size: 0
            warm_pool_max_age: 300

          receipt:
            signing_mode: "strict"
            seed_file: "${GITHUB_WORKSPACE}/.aegis/receipt_signing_seed.b64"

          demo:
            broker_env:
              - "AEGIS_CRED_GITHUB_TOKEN"
          EOF

      - name: Build repo-local Aegis CLI
        run: |
          mkdir -p .aegis/bin
          go build -buildvcs=false -o .aegis/bin/aegis ./cmd/aegis-cli

      - name: Packaged demo proof
        run: |
          ./scripts/demo_up.sh
          ./scripts/demo_clean.sh
          ./scripts/demo_exfil_denied.sh
          ./scripts/demo_broker_success.sh

      - name: Stop packaged demo runtime
        run: |
          ./scripts/demo_down.sh || true
          pkill -f "${GITHUB_WORKSPACE}/.aegis/bin/aegis serve" || true
          pkill -f "${GITHUB_WORKSPACE}/.aegis/bin/orchestrator --db " || true
          for _ in $(seq 1 20); do
            if ! curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done
          echo "runtime still active on http://localhost:8080 after canonical cleanup" >&2
          exit 1

      - name: Red-team fault matrix proof
        run: python3 scripts/run_red_team_fault_matrix.py
