name: Tier 2 Proof

on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

permissions:
  contents: read

concurrency:
  group: tier-2-proof
  cancel-in-progress: false

jobs:
  live-proof:
    name: Self-Hosted Live Proof
    runs-on:
      - self-hosted
      - linux
      - x64
      - aegis-kvm
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assert proof-runner prerequisites
        run: |
          test -c /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
          command -v systemd-run
          command -v debugfs
          test -x /usr/lib/postgresql/16/bin/initdb
          test -x /usr/lib/postgresql/16/bin/pg_ctl
          test -x /usr/lib/postgresql/16/bin/psql

      - name: Build repo-local Aegis CLI
        run: |
          mkdir -p .aegis/bin
          go build -buildvcs=false -o .aegis/bin/aegis ./cmd/aegis-cli

      - name: Canonical demo proof
        run: python3 scripts/run_canonical_demo.py --serve

      - name: Red-team fault matrix proof
        run: python3 scripts/run_red_team_fault_matrix.py
