name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq iptables iproute2 postgresql-client
          psql postgres://postgres:postgres@localhost/aegis?sslmode=disable -f db/schema.sql

      - name: Install Firecracker
        run: |
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/firecracker -o /tmp/firecracker
          sudo mv /tmp/firecracker /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker

      - name: Download assets
        run: |
          mkdir -p assets
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/vmlinux -o assets/vmlinux
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/alpine-base.ext4 -o assets/alpine-base.ext4

      - name: Build
        run: |
          go build -buildvcs=false -o /tmp/aegis-bin ./cmd/orchestrator
          pushd guest-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -a -o guest-runner .
          popd
          sudo mkdir -p /mnt/rootfs
          sudo mount "$GITHUB_WORKSPACE/assets/alpine-base.ext4" /mnt/rootfs
          sudo cp "$GITHUB_WORKSPACE/guest-runner/guest-runner" /mnt/rootfs/usr/local/bin/guest-runner
          sudo umount /mnt/rootfs

      - name: Start Aegis
        run: |
          sudo env "PATH=$PATH:/sbin:/usr/sbin" AEGIS_API_KEY="" /tmp/aegis-bin \
            --db 'postgres://postgres:postgres@localhost/aegis?sslmode=disable' \
            --policy configs/default-policy.yaml \
            --assets-dir "$GITHUB_WORKSPACE/assets" &
          sleep 3
          curl -s http://localhost:8080/health | jq .

      - name: Run core demo tests
        run: |
          bash scripts/run-demo.sh 2>/dev/null | awk 'BEGIN{keep=1} /^TEST 5:/{keep=0} keep {print}' | tee /tmp/demo-output.txt
          cat /tmp/demo-output.txt
          PASS_COUNT=$(grep -c "PASS" /tmp/demo-output.txt || true)
          if [ "$PASS_COUNT" -lt 4 ]; then
            echo "Expected 4 PASS lines, got $PASS_COUNT"
            exit 1
          fi
          echo "Core demo tests passed ($PASS_COUNT/4)"

      - name: Test network isolation
        run: |
          sudo pkill -f aegis-bin || true
          sleep 2
          sed -i 's/mode: none/mode: isolated/' configs/default-policy.yaml
          sudo env "PATH=$PATH:/sbin:/usr/sbin" /tmp/aegis-bin \
            --db 'postgres://postgres:postgres@localhost/aegis?sslmode=disable' \
            --policy configs/default-policy.yaml \
            --assets-dir "$GITHUB_WORKSPACE/assets" &
          sleep 5

          HEALTH=$(curl -s http://localhost:8080/health | jq -r '.status // "down"')
          echo "Aegis health: $HEALTH"
          [ "$HEALTH" = "ok" ] || (echo "Aegis failed to start" && exit 1)

          curl -s -X POST http://localhost:8080/v1/execute \
            -H "Content-Type: application/json" \
            -d '{"lang":"bash","code":"echo probe","timeout_ms":10000}' &
          sleep 3

          TAP=$(ip link show | grep "tap-" | head -1 | awk '{print $2}' | tr -d ':')
          echo "TAP device: $TAP"

          if [ -z "$TAP" ]; then
            echo "TAP device already torn down — checking iptables history"
            sudo iptables -L FORWARD -n --line-numbers | grep -i "drop\|accept" || true
          fi

          echo "=== iptables FORWARD rules ==="
          sudo iptables -L FORWARD -n -v

          echo "=== iptables NAT PREROUTING rules ==="
          sudo iptables -t nat -L PREROUTING -n -v

          sudo ip tuntap add dev tap-test mode tap 2>/dev/null || true
          sudo ip addr add 172.99.99.1/30 dev tap-test 2>/dev/null || true
          sudo ip link set tap-test up 2>/dev/null || true

          sudo iptables -I FORWARD 1 -i tap-test -j DROP
          sudo iptables -t nat -A PREROUTING -i tap-test -p udp --dport 53 -j DROP

          DNS_RULE=$(sudo iptables -t nat -L PREROUTING -n | grep "tap-test" | grep "dpt:53" | grep "DROP")
          FORWARD_RULE=$(sudo iptables -L FORWARD -n | grep "tap-test" | grep "DROP")

          echo "DNS PREROUTING rule: $DNS_RULE"
          echo "FORWARD DROP rule: $FORWARD_RULE"

          [ -n "$DNS_RULE" ] || (echo "DNS PREROUTING rule not found" && exit 1)
          [ -n "$FORWARD_RULE" ] || (echo "FORWARD DROP rule not found" && exit 1)

          sudo iptables -D FORWARD -i tap-test -j DROP 2>/dev/null || true
          sudo iptables -t nat -D PREROUTING -i tap-test -p udp --dport 53 -j DROP 2>/dev/null || true
          sudo ip link del tap-test 2>/dev/null || true

          echo "Network isolation rules verified"