name: Repo-Local Quality Gates

on:
  push:
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  repo-local-quality:
    name: Repo-local tests, analysis, vuln, secret, and hygiene gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.9"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Explain CI scope
        run: |
          echo "This workflow proves repo-local tests, static analysis, vulnerability scan, working-tree secret scan, and hygiene."
          echo "It does not prove live Firecracker/KVM/Postgres canonical demos on GitHub-hosted runners."

      - name: Run repo-local quality gates
        run: ./scripts/ci.sh --install-tools
