name: Tier 1 CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  fast-confidence:
    name: Fast PR Confidence
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Main module unit tests
        run: go test ./cmd/... ./internal/...

      - name: Guest runner unit tests
        working-directory: guest-runner
        run: go test ./...

      - name: Harness syntax checks
        run: python3 -m py_compile scripts/run_canonical_demo.py scripts/run_red_team_fault_matrix.py

      - name: Shell syntax checks
        run: bash -n scripts/preflight.sh scripts/run-proof-demo.sh scripts/start-local-orchestrator.sh
