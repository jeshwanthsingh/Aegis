name: CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

env:
  DB_URL: postgres://postgres:postgres@localhost/aegis?sslmode=disable

jobs:
  build-and-boot:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq iptables iproute2 postgresql-client
          psql "$DB_URL" -f db/schema.sql

      - name: Install Firecracker
        run: |
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/firecracker -o /tmp/firecracker
          sudo mv /tmp/firecracker /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker

      - name: Download assets
        run: |
          mkdir -p assets
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/vmlinux -o assets/vmlinux
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/alpine-base.ext4 -o assets/alpine-base.ext4

      - name: Build and bake guest runner
        run: |
          go build -buildvcs=false -o /tmp/aegis-bin ./cmd/orchestrator
          pushd guest-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -a -o guest-runner .
          popd
          sudo mkdir -p /mnt/rootfs
          sudo mount "$GITHUB_WORKSPACE/assets/alpine-base.ext4" /mnt/rootfs
          sudo cp "$GITHUB_WORKSPACE/guest-runner/guest-runner" /mnt/rootfs/usr/local/bin/guest-runner
          sudo mkdir -p /mnt/rootfs/workspace
          sudo umount /mnt/rootfs

      - name: Start Aegis
        run: |
          sudo env "PATH=$PATH:/sbin:/usr/sbin" AEGIS_API_KEY="" /tmp/aegis-bin             --db "$DB_URL"             --policy configs/default-policy.yaml             --assets-dir "$GITHUB_WORKSPACE/assets" >/tmp/aegis-ci.log 2>&1 &
          sleep 3
          cat /tmp/aegis-ci.log || true

      - name: Verify build and boot
        run: |
          BASE_URL=http://localhost:8080 ASSETS_DIR="$GITHUB_WORKSPACE/assets" tests/smoke/build_boot.sh

  core-demo:
    runs-on: ubuntu-latest
    needs: build-and-boot
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq iptables iproute2 postgresql-client
          psql "$DB_URL" -f db/schema.sql

      - name: Install Firecracker
        run: |
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/firecracker -o /tmp/firecracker
          sudo mv /tmp/firecracker /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker

      - name: Download assets
        run: |
          mkdir -p assets
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/vmlinux -o assets/vmlinux
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/alpine-base.ext4 -o assets/alpine-base.ext4

      - name: Build and bake guest runner
        run: |
          go build -buildvcs=false -o /tmp/aegis-bin ./cmd/orchestrator
          pushd guest-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -a -o guest-runner .
          popd
          sudo mkdir -p /mnt/rootfs
          sudo mount "$GITHUB_WORKSPACE/assets/alpine-base.ext4" /mnt/rootfs
          sudo cp "$GITHUB_WORKSPACE/guest-runner/guest-runner" /mnt/rootfs/usr/local/bin/guest-runner
          sudo mkdir -p /mnt/rootfs/workspace
          sudo umount /mnt/rootfs

      - name: Start Aegis
        run: |
          sudo env "PATH=$PATH:/sbin:/usr/sbin" AEGIS_API_KEY="" /tmp/aegis-bin             --db "$DB_URL"             --policy configs/default-policy.yaml             --assets-dir "$GITHUB_WORKSPACE/assets" >/tmp/aegis-core.log 2>&1 &
          sleep 3
          cat /tmp/aegis-core.log || true

      - name: Verify health
        run: BASE_URL=http://localhost:8080 tests/smoke/health.sh

      - name: Verify bash execution
        run: BASE_URL=http://localhost:8080 tests/smoke/execute_bash.sh

      - name: Verify python execution
        run: BASE_URL=http://localhost:8080 tests/smoke/execute_python.sh

      - name: Verify audit write
        run: BASE_URL=http://localhost:8080 DB_URL="$DB_URL" tests/integration/audit_log.sh

      - name: Verify worker pool 429
        run: BASE_URL=http://localhost:8080 tests/integration/worker_pool_429.sh

      - name: Verify teardown cleanup
        run: |
          sleep 2
          leftovers=$(find /tmp/aegis -maxdepth 1 \( -name 'scratch-*.ext4' -o -name 'fc-*.sock' -o -name 'vsock-*.sock' \) | wc -l)
          test "$leftovers" -eq 0 || { echo "leftover sandbox artifacts: $leftovers" >&2; find /tmp/aegis -maxdepth 1; exit 1; }

  isolation-checks:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aegis
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq iptables iproute2 postgresql-client
          psql "$DB_URL" -f db/schema.sql

      - name: Install Firecracker
        run: |
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/firecracker -o /tmp/firecracker
          sudo mv /tmp/firecracker /usr/local/bin/firecracker
          sudo chmod +x /usr/local/bin/firecracker

      - name: Download assets
        run: |
          mkdir -p assets
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/vmlinux -o assets/vmlinux
          curl -L https://github.com/jeshwanthsingh/Aegis/releases/download/v1.0.0/alpine-base.ext4 -o assets/alpine-base.ext4

      - name: Build and bake guest runner
        run: |
          go build -buildvcs=false -o /tmp/aegis-bin ./cmd/orchestrator
          pushd guest-runner
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=false -a -o guest-runner .
          popd
          sudo mkdir -p /mnt/rootfs
          sudo mount "$GITHUB_WORKSPACE/assets/alpine-base.ext4" /mnt/rootfs
          sudo cp "$GITHUB_WORKSPACE/guest-runner/guest-runner" /mnt/rootfs/usr/local/bin/guest-runner
          sudo mkdir -p /mnt/rootfs/workspace
          sudo umount /mnt/rootfs

      - name: Start Aegis in isolated mode
        run: |
          sed -i 's/mode: none/mode: isolated/' configs/default-policy.yaml || true
          sudo env "PATH=$PATH:/sbin:/usr/sbin" AEGIS_API_KEY="" /tmp/aegis-bin             --db "$DB_URL"             --policy configs/default-policy.yaml             --assets-dir "$GITHUB_WORKSPACE/assets" >/tmp/aegis-isolated.log 2>&1 &
          sleep 5
          cat /tmp/aegis-isolated.log || true
          BASE_URL=http://localhost:8080 tests/smoke/health.sh

      - name: Verify host firewall rules
        run: tests/isolation/firewall_rules.sh
